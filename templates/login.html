<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🔷 Main Container -->
<div class="container">

    <!-- ❌ Vulnerable Login -->
    <div class="card">
        <h2 class="glow">⚠️ Vulnerable Login</h2>

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input name="password" placeholder="Password" required>
            <button>Login</button>
        </form>

        <p style="text-align:center; color:#f87171;">
            This login is vulnerable to SQL Injection
        </p>
    </div>

    <!-- ✅ Secure Login -->
    <div class="card">
        <h2 class="glow">🔐 Secure Login</h2>

        <form method="POST" action="/secure_login">
            <input name="username" placeholder="Username" required>
            <input name="password" placeholder="Password" required>
            <button>Secure Login</button>
        </form>

        <p style="text-align:center; color:#22c55e;">
            Protected using parameterized queries
        </p>
    </div>

    <!-- 🔗 Playground Link -->
    <div class="card" style="text-align:center;">
        <a href="/playground"><button>🧪 Try SQL Injection Playground</button></a>
    </div>

</div>

</body>
</html>
