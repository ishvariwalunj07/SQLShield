<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="layout">

    <!-- 📌 Sidebar -->
    <div class="sidebar">
        <h2>🔐 SQLShield</h2>
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/playground">🧪 Playground</a>
        <a href="/admin">🛡️ Admin Logs</a>
        <a href="/report">📊 Reports</a>
        <a href="/">🚪 Logout</a>
    </div>

    <!-- 📌 Main Content -->
    <div class="main">

        <!-- 🔝 Topbar -->
        <div class="topbar">
            Welcome, User 👋
        </div>

        <!-- 📊 Content -->
        <div class="container">

            <div class="card">
                <h2 class="glow">🚀 Cybersecurity Dashboard</h2>
                <p style="text-align:center;">Monitor and test SQL Injection attacks</p>
            </div>

            <!-- 📊 Stats Grid -->
            <div class="grid">

                <div class="card stat-card">
                    🧪 <br> Attack Playground
                    <br><br>
                    <a href="/playground"><button>Open</button></a>
                </div>

                <div class="card stat-card">
                    🛡️ <br> Admin Logs
                    <br><br>
                    <a href="/admin"><button>View</button></a>
                </div>

                <div class="card stat-card">
                    📊 <br> Reports
                    <br><br>
                    <a href="/report"><button>Analyze</button></a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
